services:
  ingestor:
    build: ./services/ingestor
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=${FLASK_ENV}
      - DATABASE_URL=${DB_URL}
      - TEMP_THRESHOLD_CRITICAL=${TEMP_THRESHOLD_CRITICAL}
      - TEMP_THRESHOLD_low=${TEMP_THRESHOLD_low}
    volumes:
      - ./services/ingestor:/app
    depends_on:
      db:
        condition: service_healthy

  simulator:
    build: ./services/simulator
    ports:
      - "6000:6000"
    environment:
      - SIMULATOR_ENV=development
      - PYTHONUNBUFFERED=1
      - INGESTOR_URL=http://ingestor:5000/ingest
    volumes:
      - ./services/simulator:/app
    depends_on:
      db:
        condition: service_healthy
  
  alert:
    build: ./services/alert
    ports:
      - "7000:7000"
    environment:
      - ALERT_ENV=development
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=${DB_URL}
    volumes:
      - ./services/alert:/app
    depends_on:
      db:
        condition: service_healthy
  
  db:
    image: postgres:latest
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 3s 
      retries: 5
      start_period: 30s
