apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-db
  namespace: temp-validation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template: 
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: "sensor_data"
        - name: POSTGRES_USER
          value: "iot_user"
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-credentials
              key: password
        - name: DB_NAME
          value: "sensor_data"
        - name: DB_USER
          value: "iot_user"
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-credentials
              key: password

---
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: temp-validation
spec:
  selector:
    app: postgres
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432 
